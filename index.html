<!DOCTYPE html>
<html>
<head>
  <title>Nations Uprising</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0b1f3a, #1e3c72);
      color: white;
      text-align: center;
    }

    .header {
      padding: 40px 20px 10px 20px;
      font-size: 36px;
      font-weight: bold;
    }

    .sub {
      font-size: 18px;
      margin-bottom: 30px;
    }

    /* BOX STYLE (Server + Buttons) */
    .box {
      background: rgba(255,255,255,0.1);
      padding: 25px 30px;
      border-radius: 15px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 200px;
      min-height: 120px;
      margin: 10px;
    }

    /* BUTTONS ROW */
    .button-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 18px 30px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00c3ff, #00e0ff);
      color: black;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 180px;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 195, 255, 0.4);
    }

    button:active {
      transform: scale(0.97);
    }

    a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="header">🌍 Nations Uprising</div>
  <div class="sub">Build. Conquer. Rise.</div>

  <!-- SERVER STATUS -->
  <div class="box">
    <h2>Server Status</h2>
    <p>🟢 Active</p>
    <p><strong>IP:</strong> nationsuprising.mcsh.io</p>
  </div>

  <!-- BUTTONS ROW -->
  <div class="button-row">
    <div class="box">
      <a href="https://discord.gg/xjRsYH5tNs" target="_blank"><button>Join Discord</button></a>
    </div>
    <div class="box">
      <a href="http://191.96.231.14:13429/?worldname=world&mapname=flat&zoom=0&x=1480&y=64&z=-356" target="_blank"><button>Open Bluemap</button></a>
    </div>
    <div class="box">
      <a href="countries.html"><button>View Countries</button></a>
    </div>
  </div>

</body>
</html>
